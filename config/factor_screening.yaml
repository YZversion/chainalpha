# 因子事件研究配置 — 窗口 2020–2025，先验 Edge，不调参
schema_version: 1

date_range:
  start: "2020-01-01"
  end: "2025-12-31"

horizons: [3, 5, 10]

# 无 Edge 判定（均值/超额低于阈值 → DELETE，不进入组合）
kill_criteria:
  min_signal_count: 30
  primary_horizon: 5
  delete_if_mean_below: 0.0
  delete_if_excess_below: 0.001      # 相对随机对照超额 < 0.1%
  strong_delete_if_mean_below: -0.005  # 5 日均收益 ≤ -0.5% 直接删

random_seed: 42

# 待筛信号（在 events.py 注册）；无 Edge 的从列表移除
signals:
  - volume_spike_long_upper_shadow
  - limit_up_in_past_month

# 全市场扫描时 AkShare 股票列表；空则运行脚本时用 probe 样本
# universe: []  # 人工或 ingest 填充

# 指数代码（用于牛熊分环境，可选；无数据时跳过）
